<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background Rectangle -->
  <rect x="0" y="0" width="800" height="600" fill="#1a1a2e"/>

  <!-- Arrowhead definitions -->
  <defs>
    <!-- Standard Arrowhead -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8c766" />
    </marker>
    <!-- Smaller Arrowhead for internal/dashed lines -->
    <marker id="arrowhead-small" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto">
      <polygon points="0 0, 8 2.5, 0 5" fill="#e8c766" />
    </marker>
  </defs>

  <!-- Title Section -->
  <g class="anim-fade-in" id="title-group">
    <text x="400" y="50" text-anchor="middle" font-size="36" fill="#e0e0e0" font-weight="bold">Microservices vs Monolith Architecture</text>
    <line x1="200" y1="65" x2="600" y2="65" stroke="#e0e0e0" stroke-width="2"/>
  </g>

  <!-- Monolith Architecture Section -->
  <g id="monolith-section">
    <!-- Monolith Heading -->
    <g class="anim-slide-up" id="monolith-heading-group">
      <text x="200" y="100" text-anchor="middle" font-size="24" fill="#e94560" font-weight="bold">Monolith Architecture</text>
    </g>

    <!-- Monolith Diagram -->
    <g class="anim-fade-in" id="monolith-diagram-group">
      <!-- Main Monolithic Application Block -->
      <g class="anim-scale" id="monolith-main-app-block">
        <rect x="100" y="130" width="200" height="180" fill="#e94560" rx="10" ry="10" stroke="#e0e0e0" stroke-width="1"/>
        <text x="200" y="190" text-anchor="middle" font-size="20" fill="#e0e0e0" font-weight="bold">Monolithic App</text>
        <text x="200" y="215" text-anchor="middle" font-size="14" fill="#e0e0e0">Business Logic</text>
        <text x="200" y="235" text-anchor="middle" font-size="14" fill="#e0e0e0">UI Module</text>
        <text x="200" y="255" text-anchor="middle" font-size="14" fill="#e0e0e0">Data Access</text>
      </g>

      <!-- External Components (Database, Users) -->
      <g class="anim-fade-in" id="monolith-external-components">
        <rect x="120" y="330" width="70" height="40" fill="#e8c766" rx="5" ry="5"/>
        <text x="155" y="355" text-anchor="middle" font-size="12" fill="#1a1a2e">Database</text>
        <rect x="210" y="330" width="70" height="40" fill="#e8c766" rx="5" ry="5"/>
        <text x="245" y="355" text-anchor="middle" font-size="12" fill="#1a1a2e">Users</text>
      </g>

      <!-- Connection Arrows -->
      <g class="anim-fade-in" id="monolith-diagram-arrows">
        <line x1="200" y1="310" x2="155" y2="330" stroke="#e8c766" stroke-width="2" marker-end="url(#arrowhead)"/>
        <line x1="200" y1="310" x2="245" y2="330" stroke="#e8c766" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>
    </g>

    <!-- Monolith Key Characteristics -->
    <g class="anim-slide-up" id="monolith-chars-group">
      <text x="40" y="400" font-size="16" fill="#e0e0e0" font-weight="bold">Key Characteristics:</text>

      <text x="60" y="430" font-size="14" fill="#e0e0e0">Initial Setup Speed:</text>
      <text x="220" y="430" text-anchor="end" font-size="14" fill="#e94560"><tspan data-target="80">80</tspan>% Faster</text>

      <text x="60" y="455" font-size="14" fill="#e0e0e0">Granular Scalability:</text>
      <text x="220" y="455" text-anchor="end" font-size="14" fill="#e94560"><tspan data-target="20">20</tspan>%</text>

      <text x="60" y="480" font-size="14" fill="#e0e0e0">Fault Isolation:</text>
      <text x="220" y="480" text-anchor="end" font-size="14" fill="#e94560"><tspan data-target="10">10</tspan>%</text>

      <text x="60" y="505" font-size="14" fill="#e0e0e0">Complexity:</text>
      <text x="220" y="505" text-anchor="end" font-size="14" fill="#e94560"><tspan data-target="30">30</tspan>% (Low)</text>

      <text x="60" y="530" font-size="14" fill="#e0e0e0">Tech Lock-in:</text>
      <text x="220" y="530" text-anchor="end" font-size="14" fill="#e94560">High</text>

      <text x="60" y="555" font-size="14" fill="#e0e0e0">Deployment:</text>
      <text x="220" y="555" text-anchor="end" font-size="14" fill="#e94560">Single Unit</text>
    </g>
  </g>

  <!-- Microservices Architecture Section -->
  <g id="microservices-section">
    <!-- Microservices Heading -->
    <g class="anim-slide-up" id="microservices-heading-group">
      <text x="600" y="100" text-anchor="middle" font-size="24" fill="#00d4aa" font-weight="bold">Microservices Architecture</text>
    </g>

    <!-- Microservices Diagram -->
    <g class="anim-fade-in" id="microservices-diagram-group">
      <!-- API Gateway Block -->
      <g class="anim-scale" id="microservices-api-gateway">
        <rect x="520" y="130" width="160" height="40" fill="#00d4aa" rx="5" ry="5" stroke="#e0e0e0" stroke-width="1"/>
        <text x="600" y="155" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">API Gateway</text>
      </g>

      <!-- Individual Service Blocks -->
      <g class="anim-scale" id="microservices-services-blocks">
        <rect x="440" y="200" width="90" height="50" fill="#e0e0e0" rx="5" ry="5"/>
        <text x="485" y="230" text-anchor="middle" font-size="12" fill="#1a1a2e">Service A</text>
        <rect x="545" y="220" width="90" height="50" fill="#e0e0e0" rx="5" ry="5"/>
        <text x="590" y="250" text-anchor="middle" font-size="12" fill="#1a1a2e">Service B</text>
        <rect x="650" y="200" width="90" height="50" fill="#e0e0e0" rx="5" ry="5"/>
        <text x="695" y="230" text-anchor="middle" font-size="12" fill="#1a1a2e">Service C</text>
      </g>

      <!-- Database for Service B (example of dedicated DB) -->
      <g class="anim-fade-in" id="microservices-db-block">
        <rect x="545" y="280" width="90" height="30" fill="#e8c766" rx="5" ry="5"/>
        <text x="590" y="300" text-anchor="middle" font-size="10" fill="#1a1a2e">DB B</text>
      </g>

      <!-- External Components (Users) -->
      <g class="anim-fade-in" id="microservices-external-components">
        <rect x="550" y="330" width="100" height="40" fill="#e8c766" rx="5" ry="5"/>
        <text x="600" y="355" text-anchor="middle" font-size="12" fill="#1a1a2e">Users</text>
      </g>

      <!-- Connection Arrows -->
      <g class="anim-fade-in" id="microservices-diagram-arrows">
        <!-- API Gateway to Services -->
        <line x1="600" y1="170" x2="485" y2="200" stroke="#e8c766" stroke-width="2" marker-end="url(#arrowhead)"/>
        <line x1="600" y1="170" x2="590" y2="220" stroke="#e8c766" stroke-width="2" marker-end="url(#arrowhead)"/>
        <line x1="600" y1="170" x2="695" y2="200" stroke="#e8c766" stroke-width="2" marker-end="url(#arrowhead)"/>

        <!-- Service-to-Service Communication (dashed) -->
        <line x1="530" y1="225" x2="545" y2="235" stroke="#e8c766" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrowhead-small)"/>
        <line x1="635" y1="245" x2="650" y2="225" stroke="#e8c766" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrowhead-small)"/>
        
        <!-- Service B to DB B -->
        <line x1="590" y1="270" x2="590" y2="280" stroke="#e8c766" stroke-width="1" marker-end="url(#arrowhead-small)"/>

        <!-- Users to API Gateway -->
        <line x1="600" y1="330" x2="600" y2="170" stroke="#e8c766" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>
    </g>

    <!-- Microservices Key Characteristics -->
    <g class="anim-slide-up" id="microservices-chars-group">
      <text x="440" y="400" font-size="16" fill="#e0e0e0" font-weight="bold">Key Characteristics:</text>

      <text x="460" y="430" font-size="14" fill="#e0e0e0">Initial Setup Speed:</text>
      <text x="620" y="430" text-anchor="end" font-size="14" fill="#00d4aa"><tspan data-target="40">40</tspan>% Slower</text>

      <text x="460" y="455" font-size="14" fill="#e0e0e0">Granular Scalability:</text>
      <text x="620" y="455" text-anchor="end" font-size="14" fill="#00d4aa"><tspan data-target="95">95</tspan>%</text>

      <text x="460" y="480" font-size="14" fill="#e0e0e0">Fault Isolation:</text>
      <text x="620" y="480" text-anchor="end" font-size="14" fill="#00d4aa"><tspan data-target="90">90</tspan>%</text>

      <text x="460" y="505" font-size="14" fill="#e0e0e0">Complexity:</text>
      <text x="620" y="505" text-anchor="end" font-size="14" fill="#00d4aa"><tspan data-target="80">80</tspan>% (High)</tspan></text>

      <text x="460" y="530" font-size="14" fill="#e0e0e0">Tech Lock-in:</text>
      <text x="620" y="530" text-anchor="end" font-size="14" fill="#00d4aa">Low</text>

      <text x="460" y="555" font-size="14" fill="#e0e0e0">Deployment:</text>
      <text x="620" y="555" text-anchor="end" font-size="14" fill="#00d4aa">Independent Units</text>
    </g>
  </g>

  <!-- Comparison Summary / Call to Action -->
  <g class="anim-fade-in" id="summary-group">
    <line x1="200" y1="580" x2="600" y2="580" stroke="#e0e0e0" stroke-width="1"/>
    <text x="400" y="595" text-anchor="middle" font-size="18" fill="#e0e0e0">Choose the right architecture for your project needs!</text>
  </g>
</svg>